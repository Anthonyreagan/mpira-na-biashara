<!-- templates/base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mpira na Biashara - {% block title %}{% endblock %}</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Optional: Custom CSS if you add any later -->
    <!-- <link rel="stylesheet" href="{% static 'css/style.css' %}"> -->
    <style>
        /* Apply Inter font */
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">
    <!-- App Bar / Navigation -->
    <nav class="bg-gradient-to-r from-blue-600 to-purple-600 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <!-- Logo/Brand Name -->
            <a href="{% url 'core:home' %}" class="text-white text-2xl font-bold rounded-md px-3 py-1 hover:bg-white hover:text-blue-600 transition duration-300">
                Mpira na Biashara
            </a>

            <!-- Navigation Links (Hidden on small screens, shown on medium and larger) -->
            <div class="hidden md:flex space-x-6">
                <a href="{% url 'core:home' %}" class="text-white hover:text-blue-200 transition duration-300 text-lg font-medium">Home</a>
                <a href="{% url 'core:about' %}" class="text-white hover:text-blue-200 transition duration-300 text-lg font-medium">About Us</a>
                <!-- Placeholder for other app links - we'll make these dynamic later -->
                <a href="#" class="text-white hover:text-blue-200 transition duration-300 text-lg font-medium">Services</a>
                <a href="#" class="text-white hover:text-blue-200 transition duration-300 text-lg font-medium">Blog</a>
                <a href="#" class="text-white hover:text-blue-200 transition duration-300 text-lg font-medium">Gallery</a>
                <a href="#" class="text-white hover:text-blue-200 transition duration-300 text-lg font-medium">Contact</a>
            </div>

            <!-- Mobile Menu Button (Hamburger Icon) -->
            <div class="md:hidden">
                <button id="mobile-menu-button" class="text-white focus:outline-none">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile Menu (Hidden by default) -->
        <div id="mobile-menu" class="md:hidden hidden bg-blue-700 mt-2 rounded-lg py-2">
            <a href="{% url 'core:home' %}" class="block px-4 py-2 text-white hover:bg-blue-600 rounded-md transition duration-300">Home</a>
            <a href="{% url 'core:about' %}" class="block px-4 py-2 text-white hover:bg-blue-600 rounded-md transition duration-300">About Us</a>
            <!-- Placeholder for other app links -->
            <a href="#" class="block px-4 py-2 text-white hover:bg-blue-600 rounded-md transition duration-300">Services</a>
            <a href="#" class="block px-4 py-2 text-white hover:bg-blue-600 rounded-md transition duration-300">Blog</a>
            <a href="#" class="block px-4 py-2 text-white hover:bg-blue-600 rounded-md transition duration-300">Gallery</a>
            <a href="#" class="block px-4 py-2 text-white hover:bg-blue-600 rounded-md transition duration-300">Contact</a>
        </div>
    </nav>

    <!-- Main Content Block -->
    <main class="container mx-auto mt-8 p-6 bg-white rounded-lg shadow-md">
        {% block content %}
            <!-- Content from child templates will go here -->
        {% endblock content %}
    </main>

    <!-- Footer (Optional, but good for consistency) -->
    <footer class="bg-gray-800 text-white text-center p-4 mt-8">
        <div class="container mx-auto">
            <p>&copy; {% now "Y" %} Mpira na Biashara. All rights reserved.</p>
        </div>
    </footer>

    <!-- JavaScript for Mobile Menu Toggle -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const mobileMenu = document.getElementById('mobile-menu');

            if (mobileMenuButton && mobileMenu) {
                mobileMenuButton.addEventListener('click', function() {
                    mobileMenu.classList.toggle('hidden');
                });
            }
        });
    </script>
</body>
</html>
