{% extends 'base.html' %}
{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <article class="max-w-4xl mx-auto bg-white rounded-xl shadow-md overflow-hidden">
        {% if post.image %}
        <div class="h-96 w-full overflow-hidden">
            <img src="{{ post.image.url }}" alt="{{ post.title }}"
                 class="w-full h-full object-cover transition duration-500 hover:scale-105">
        </div>
        {% endif %}

        <div class="p-8">
            <div class="mb-6">
                <h1 class="text-4xl md:text-5xl font-bold text-gray-900 font-serif leading-tight mb-3">
                    {{ post.title }}
                </h1>
                <p class="text-gray-600 text-sm font-sans">
                    By <span class="font-semibold text-gray-800">{{ post.author }}</span>
                    on <span class="text-gray-700">{{ post.published_date|date:"F d, Y" }}</span>
                </p>
            </div>

            <div class="prose prose-lg max-w-none font-sans text-gray-700 leading-relaxed">
                {{ post.content|linebreaksbr }}
            </div>

            <div class="mt-12 pt-6 border-t border-gray-100">
                <a href="{% url 'blog:list' %}"
                   class="inline-flex items-center font-medium text-indigo-600 hover:text-indigo-800 transition duration-300 group">
                    <svg class="w-5 h-5 mr-2 transition-transform duration-300 group-hover:-translate-x-1"
                         fill="none" stroke="currentColor" viewBox="0 0 24 24"
                         xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Back to Blog
                </a>
            </div>
        </div>
    </article>
</div>
{% endblock content %}
