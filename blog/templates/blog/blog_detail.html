<!-- blog/templates/blog/blog_detail.html -->
{% extends 'base.html' %}
{% block title %}{{ post.title }}{% endblock %}

{% block content %}
    <article class="bg-white p-8 rounded-lg shadow-lg">
        <h1 class="text-4xl font-extrabold text-gray-900 mb-4">{{ post.title }}</h1>
        <p class="text-gray-600 text-sm mb-6">
            By <span class="font-semibold">{{ post.author }}</span> on {{ post.published_date|date:"F d, Y \a\t H:i" }}
        </p>
        <div class="prose max-w-none text-gray-800 leading-relaxed text-lg">
            {{ post.content|linebreaksbr }} <!-- Renders newlines as <br> tags -->
        </div>
        <div class="mt-8">
            <a href="{% url 'blog:list' %}" class="inline-flex items-center text-blue-600 hover:text-blue-800 transition duration-300">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Blog
            </a>
        </div>
    </article>
{% endblock content %}
